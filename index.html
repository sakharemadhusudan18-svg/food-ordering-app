<style>
:root {
  --bg: #FFFAF5; --fg: #1E293B; --muted: #64748B; --accent: #F97316;
  --card: #FFFFFF; --border: #E2E8F0; --surface: #F8FAFC; --success: #10B981; --danger: #EF4444;
}
.dark {
  --bg: #0F172A; --fg: #F1F5F9; --muted: #94A3B8; --accent: #FB923C;
  --card: #1E293B; --border: #334155; --surface: #1E293B; --success: #34D399; --danger: #F87171;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--fg); transition:background .3s,color .3s; overflow-x:hidden; }
h1,h2,h3,h4,h5 { font-family:'Playfair Display',serif; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--surface); }
::-webkit-scrollbar-thumb { background:var(--accent); border-radius:3px; }
@keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideRight { from{transform:translateX(100%)} to{transform:translateX(0)} }
@keyframes scaleIn { from{opacity:0;transform:scale(.9)} to{opacity:1;transform:scale(1)} }
@keyframes pulseGlow { 0%,100%{box-shadow:0 0 5px rgba(249,115,22,.3)} 50%{box-shadow:0 0 20px rgba(249,115,22,.6)} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes toastIn { from{transform:translateX(120%);opacity:0} to{transform:translateX(0);opacity:1} }
@keyframes toastOut { from{transform:translateX(0);opacity:1} to{transform:translateX(120%);opacity:0} }
@keyframes heroBg { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
.anim-fade-up { animation:fadeUp .6s ease both; }
.anim-fade-in { animation:fadeIn .5s ease both; }
.anim-scale { animation:scaleIn .4s ease both; }
.anim-float { animation:float 3s ease-in-out infinite; }
.anim-d1 { animation-delay:.1s; }
.anim-d2 { animation-delay:.2s; }
.anim-d3 { animation-delay:.3s; }
.anim-d4 { animation-delay:.4s; }
.hero-bg { background:linear-gradient(135deg,#7C2D12 0%,#C2410C 25%,#F97316 50%,#EA580C 75%,#9A3412 100%); background-size:400% 400%; animation:heroBg 12s ease infinite; }
.glass { background:rgba(255,255,255,.08); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,.12); }
.dark .glass { background:rgba(15,23,42,.6); border:1px solid rgba(255,255,255,.08); }
.card-hover { transition:all .3s ease; }
.card-hover:hover { transform:translateY(-6px); box-shadow:0 20px 40px rgba(0,0,0,.1); }
.dark .card-hover:hover { box-shadow:0 20px 40px rgba(0,0,0,.4); }
.btn-primary { background:var(--accent); color:#fff; padding:.65rem 1.5rem; border-radius:.75rem; font-weight:600; border:none; cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:.5rem; font-family:inherit; font-size:.9rem; }
.btn-primary:hover { filter:brightness(1.1); transform:translateY(-1px); box-shadow:0 4px 12px rgba(249,115,22,.4); }
.btn-secondary { background:var(--surface); color:var(--fg); padding:.65rem 1.5rem; border-radius:.75rem; font-weight:600; border:1px solid var(--border); cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:.5rem; font-family:inherit; font-size:.9rem; }
.btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
.btn-danger { background:var(--danger); color:#fff; padding:.5rem 1rem; border-radius:.5rem; font-weight:600; border:none; cursor:pointer; transition:all .2s; font-family:inherit; font-size:.85rem; }
.btn-danger:hover { filter:brightness(1.1); }
.btn-sm { padding:.4rem .8rem; font-size:.8rem; border-radius:.5rem; }
.input { width:100%; padding:.7rem 1rem; border-radius:.75rem; border:1px solid var(--border); background:var(--card); color:var(--fg); font-family:inherit; font-size:.95rem; transition:border-color .2s; outline:none; }
.input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(249,115,22,.15); }
.input::placeholder { color:var(--muted); }
.badge { display:inline-flex; align-items:center; padding:.15rem .6rem; border-radius:9999px; font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
.badge-success { background:rgba(16,185,129,.15); color:var(--success); }
.badge-warning { background:rgba(249,115,22,.15); color:var(--accent); }
.badge-danger { background:rgba(239,68,68,.15); color:var(--danger); }
.badge-info { background:rgba(59,130,246,.15); color:#3B82F6; }
.toast { animation:toastIn .4s ease both; }
.toast.removing { animation:toastOut .3s ease both; }
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); backdrop-filter:blur(4px); z-index:50; animation:fadeIn .2s ease; }
.cart-sidebar { position:fixed; top:0; right:0; bottom:0; width:min(420px,90vw); background:var(--card); z-index:60; animation:slideRight .3s ease; box-shadow:-10px 0 40px rgba(0,0,0,.15); overflow-y:auto; }
.step-dot { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.8rem; font-weight:700; transition:all .3s; flex-shrink:0; }
.step-dot.active { background:var(--accent); color:#fff; }
.step-dot.done { background:var(--success); color:#fff; }
.step-dot.pending { background:var(--surface); color:var(--muted); border:2px solid var(--border); }
.step-line { height:2px; flex:1; min-width:8px; background:var(--border); transition:background .3s; }
.step-line.done { background:var(--success); }
.cat-pill { padding:.4rem 1rem; border-radius:9999px; cursor:pointer; font-size:.85rem; font-weight:500; border:1px solid var(--border); transition:all .2s; white-space:nowrap; background:var(--card); color:var(--fg); }
.cat-pill.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.cat-pill:hover:not(.active) { border-color:var(--accent); color:var(--accent); }
.qty-btn { width:28px; height:28px; border-radius:50%; border:1px solid var(--border); background:var(--card); color:var(--fg); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.9rem; transition:all .15s; }
.qty-btn:hover { border-color:var(--accent); color:var(--accent); }
.modal-content { background:var(--card); border-radius:1rem; max-width:500px; width:90%; max-height:90vh; overflow-y:auto; animation:scaleIn .3s ease; }
.stat-glow { position:relative; overflow:hidden; }
.stat-glow::before { content:''; position:absolute; top:-50%; right:-50%; width:100%; height:100%; background:radial-gradient(circle,rgba(249,115,22,.1) 0%,transparent 70%); pointer-events:none; }
.tab { padding:.5rem 1rem; border-radius:.5rem; cursor:pointer; font-weight:500; transition:all .2s; color:var(--muted); background:transparent; border:none; font-family:inherit; font-size:.9rem; }
.tab.active { background:var(--accent); color:#fff; }
.tab:hover:not(.active) { color:var(--fg); background:var(--surface); }
.notif-dot { position:absolute; top:-2px; right:-2px; width:8px; height:8px; background:var(--danger); border-radius:50%; animation:pulseGlow 2s infinite; }
@media(max-width:768px) { .hero-bg { background-size:300% 300%; } }
@media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation-duration:0.01ms!important; transition-duration:0.01ms!important; } }
</style>

var S = {
  user:null, cart:[], orders:[], users:[], favorites:{restaurants:[],foods:[]},
  theme:'light', cartOpen:false, appliedCoupon:null
};

function initState() {
  try {
    var saved = localStorage.getItem('foodFleetApp');
    if (saved) { var p = JSON.parse(saved); for(var k in p) S[k]=p[k]; }
  } catch(e){}
  if (!S.orders || S.orders.length < SAMPLE_ORDERS.length) S.orders = JSON.parse(JSON.stringify(SAMPLE_ORDERS));
  if (!S.users || S.users.length < DEMO_USERS.length) S.users = JSON.parse(JSON.stringify(DEMO_USERS));
  if (!S.favorites) S.favorites = {restaurants:[],foods:[]};
  if (S.theme === 'dark') document.documentElement.classList.add('dark');
  else document.documentElement.classList.remove('dark');
}

function saveState() {
  var d = {}; for(var k in S) { if(k!=='cartOpen') d[k]=S[k]; }
  localStorage.setItem('foodFleetApp', JSON.stringify(d));
}

function getInitials(n) { return n.split(' ').map(function(w){return w[0]}).join('').toUpperCase().slice(0,2); }
function fmtPrice(p) { return 'Rs.' + p.toLocaleString('en-IN'); }
function timeAgo(ds) { var d=Date.now()-new Date(ds).getTime(); var m=Math.floor(d/60000); if(m<60) return m+'m ago'; var h=Math.floor(m/60); if(h<24) return h+'h ago'; return Math.floor(h/24)+'d ago'; }
function statusColor(s) { return {placed:'badge-info',accepted:'badge-warning',preparing:'badge-warning',out_for_delivery:'badge-info',delivered:'badge-success',cancelled:'badge-danger'}[s]||'badge-info'; }
function statusLabel(s) { return {placed:'Placed',accepted:'Accepted',preparing:'Preparing',out_for_delivery:'Out for Delivery',delivered:'Delivered',cancelled:'Cancelled'}[s]||s; }
function stepIdx(s) { return {placed:0,accepted:1,preparing:2,out_for_delivery:3,delivered:4,cancelled:-1}[s]??-1; }
function stars(r) { var h=''; for(var i=1;i<=5;i++) h+='<i class="fas fa-star text-sm '+(i<=Math.round(r)?'text-amber-400':'text-gray-300 dark:text-gray-600')+'"></i>'; return h; }
function isFav(type,id) { return S.favorites[type] && S.favorites[type].indexOf(id)>-1; }
function toggleFav(type,id) { if(!S.favorites[type]) S.favorites[type]=[]; var i=S.favorites[type].indexOf(id); if(i>-1) S.favorites[type].splice(i,1); else S.favorites[type].push(id); saveState(); render(); }
function cartTotal() { var sub=S.cart.reduce(function(s,c){return s+c.price*c.qty},0); var df=sub>0?40:0; var disc=0; if(S.appliedCoupon){var c=S.appliedCoupon; disc=c.type==='percent'?Math.min(sub*c.discount/100,c.maxDiscount):c.discount;} return {subtotal:sub,deliveryFee:df,discount:disc,total:Math.max(0,sub+df-disc)}; }
function findRest(id) { return RESTAURANTS.find(function(r){return r.id===id}); }
function findFood(id) { return FOODS.find(function(f){return f.id===id}); }

/* ===================== TOAST ===================== */
function showToast(msg, type) {
  type = type || 'info';
  var c = document.getElementById('toast-container');
  var colors = {success:'border-l-4 border-emerald-500',error:'border-l-4 border-red-500',info:'border-l-4 border-blue-500',warning:'border-l-4 border-amber-500'};
  var icons = {success:'fa-check-circle text-emerald-500',error:'fa-times-circle text-red-500',info:'fa-info-circle text-blue-500',warning:'fa-exclamation-circle text-amber-500'};
  var el = document.createElement('div');
  el.className = 'toast ' + (colors[type]||colors.info) + ' flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg min-w-[280px]';
  el.style.cssText = 'background:var(--card);color:var(--fg);pointer-events:auto;';
  el.innerHTML = '<i class="fas '+(icons[type]||icons.info)+'"></i><span class="text-sm font-medium flex-1">'+msg+'</span><button onclick="this.parentElement.classList.add(\'removing\');setTimeout(function(){this.parentElement.remove()}.bind(this),300)" style="color:var(--muted);background:none;border:none;cursor:pointer;"><i class="fas fa-times text-xs"></i></button>';
  c.appendChild(el);
  setTimeout(function(){ if(el.parentElement){el.classList.add('removing');setTimeout(function(){el.remove()},300)} },3500);
}

/* ===================== ROUTER ===================== */
var routes = {};
function nav(path) { window.location.hash = '#' + path; }
function initRouter() {
  window.addEventListener('hashchange', resolveRoute);
  resolveRoute();
}
function resolveRoute() {
  var hash = window.location.hash.slice(1) || 'home';
  var parts = hash.split('/');
  var path = parts[0];
  var params = parts.slice(1);
  window.scrollTo({top:0,behavior:'smooth'});
  var fn = routes[path];
  if (fn) fn.apply(null, params);
  else if (routes['home']) routes['home']();
}

/* ===================== CART ===================== */
function addToCart(foodId) {
  var f = findFood(foodId);
  if (!f) return;
  var ex = S.cart.find(function(c){return c.id===f.id});
  if (ex) ex.qty++; else S.cart.push({id:f.id,name:f.name,image:f.image,price:f.price,restaurantId:f.restaurantId,isVeg:f.isVeg,qty:1});
  saveState(); S.cartOpen=true; render();
  showToast(f.name + ' added to cart','success');
}
function updateQty(foodId, delta) {
  var item = S.cart.find(function(c){return c.id===foodId});
  if (!item) return;
  item.qty += delta;
  if (item.qty<=0) S.cart = S.cart.filter(function(c){return c.id!==foodId});
  saveState(); render();
}
function clearCart() { S.cart=[]; S.appliedCoupon=null; saveState(); render(); }
function applyCoupon(code) {
  var coupon = COUPONS.find(function(c){return c.code===code.toUpperCase() && c.isActive});
  if (!coupon) return 'Invalid or expired coupon';
  var sub = S.cart.reduce(function(s,c){return s+c.price*c.qty},0);
  if (sub < coupon.minOrder) return 'Minimum order of Rs.'+coupon.minOrder+' required';
  S.appliedCoupon = coupon; saveState(); render();
  showToast('Coupon applied: '+coupon.description,'success'); return null;
}

/* ===================== AUTH ===================== */
function login(email, pw) {
  var u = S.users.find(function(u){return u.email===email && u.password===pw});
  if (!u) return false;
  S.user = JSON.parse(JSON.stringify(u)); saveState(); render();
  showToast('Welcome back, '+u.name+'!','success'); return true;
}
function register(data) {
  if (S.users.find(function(u){return u.email===data.email})) return 'Email already exists';
  var nu = {id:'u'+Date.now(),name:data.name,email:data.email,password:data.password,role:'customer',phone:data.phone||'',address:data.address||'',avatar:'https://picsum.photos/seed/'+Date.now()+'/200/200.jpg',joinedDate:new Date().toISOString().split('T')[0]};
  S.users.push(nu); S.user=JSON.parse(JSON.stringify(nu)); saveState(); render();
  showToast('Account created successfully!','success'); return null;
}
function logout() { S.user=null; S.cart=[]; S.appliedCoupon=null; saveState(); window.location.hash='#home'; render(); showToast('Logged out','info'); }

/* ===================== RENDER ===================== */
function render() {
  var app = document.getElementById('app');
  var hash = window.location.hash.slice(1) || 'home';
  var parts = hash.split('/');
  var path = parts[0];
  var fn = routes[path];
  if (fn) {
    app.innerHTML = fn.apply(null, parts.slice(1));
  } else {
    app.innerHTML = routes['home']();
  }
  // Init charts after render
  setTimeout(initPageCharts, 50);
}

function placeOrder() {
  var addr = document.getElementById('chk-addr')?.value || S.user.address;

  h += '<main class="max-w-7xl mx-auto px-4 sm:px-6 py-8"><h1 class="font-display text-3xl font-bold mb-8" style="color:var(--fg);">Super Admin Panel</h1>';
  h += '<div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-8">';
  [{l:'Revenue',v:fmtPrice(rev),i:'fa-indian-rupee-sign',c:'text-emerald-500',b:'bg-emerald-50 dark:bg-emerald-900/20'},{l:'Customers',v:custs,i:'fa-users',c:'text-blue-500',b:'bg-blue-50 dark:bg-blue-900/20'},{l:'Restaurants',v:rests,i:'fa-store',c:'text-purple-500',b:'bg-purple-50 dark:bg-purple-900/20'},{l:'Active Orders',v:act,i:'fa-spinner',c:'text-amber-500',b:'bg-amber-50 dark:bg-amber-900/20'},{l:'Pending',v:pend,i:'fa-clock',c:'text-red-500',b:'bg-red-50 dark:bg-red-900/20'}].forEach(function(s,i){
    h+='<div class="p-4 rounded-2xl stat-glow card-hover anim-fade-up" style="background:var(--card);border:1px solid var(--border);animation-delay:'+i*0.05+'s;"><div class="w-9 h-9 rounded-xl '+s.b+' flex items-center justify-center mb-3"><i class="fas '+s.i+' '+s.c+' text-sm"></i></div><p class="text-xl font-bold" style="color:var(--fg);">'+s.v+'</p><p class="text-[11px] mt-0.5" style="color:var(--muted);">'+s.l+'</p></div>';
  });
  h += '</div>';
  h += '<div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8"><div class="p-6 rounded-2xl" style="background:var(--card);border:1px solid var(--border);"><h3 class="font-display font-bold text-lg mb-4" style="color:var(--fg);">Orders Trend</h3><div style="height:250px;"><canvas id="super-ord-chart"></canvas></div></div><div class="p-6 rounded-2xl" style="background:var(--card);border:1px solid var(--border);"><h3 class="font-display font-bold text-lg mb-4" style="color:var(--fg);">Revenue by Cuisine</h3><div style="height:250px;"><canvas id="super-cui-chart"></canvas></div></div></div>';
  // Tabs
  h += '<div class="flex gap-2 mb-6 overflow-x-auto pb-2"><button class="tab active" onclick="showSuperTab(\'approvals\',this)">Pending Approvals</button><button class="tab" onclick="showSuperTab(\'users\',this)">All Users</button><button class="tab" onclick="showSuperTab(\'rests\',this)">All Restaurants</button><button class="tab" onclick="showSuperTab(\'allords\',this)">All Orders</button></div>';
  // Approvals
  h += '<div id="st-approvals" class="p-6 rounded-2xl" style="background:var(--card);border:1px solid var(--border);">';
  var unapproved = RESTAURANTS.filter(function(r){return !r.approved});
  if(unapproved.length===0) h+='<p class="text-center py-8" style="color:var(--muted);">No pending approvals</p>';
  else {h+='<div class="space-y-3">';unapproved.forEach(function(r){h+='<div class="flex flex-wrap items-center gap-4 p-4 rounded-xl" style="background:var(--surface);"><img src="'+r.image+'" class="w-16 h-16 rounded-xl object-cover"><div class="flex-1 min-w-[200px]"><p class="font-semibold" style="color:var(--fg);">'+r.name+'</p><p class="text-sm" style="color:var(--muted);">'+r.cuisine+' · '+r.address+'</p></div><div class="flex gap-2"><button onclick="approveRest(\''+r.id+'\')" class="btn-primary btn-sm"><i class="fas fa-check mr-1"></i>Approve</button><button onclick="rejectRest(\''+r.id+'\')" class="btn-danger btn-sm"><i class="fas fa-times mr-1"></i>Reject</button></div></div>';});h+='</div>';}
  h += '</div>';
  // Users
  h += '<div id="st-users" class="hidden p-6 rounded-2xl" style="background:var(--card);border:1px solid var(--border);"><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr style="color:var(--muted);border-bottom:1px solid var(--border);"><th class="text-left py-3 px-2">User</th><th class="text-left py-3 px-2">Email</th><th class="text-left py-3 px-2">Role</th><th class="text-left py-3 px-2">Joined</th></tr></thead><tbody>';
  S.users.forEach(function(u){h+='<tr style="border-bottom:1px solid var(--border);"><td class="py-3 px-2"><div class="flex items-center gap-2"><img src="'+u.avatar+'" class="w-8 h-8 rounded-lg object-cover"><span style="color:var(--fg);" class="font-medium">'+u.name+'</span></div></td><td class="py-3 px-2" style="color:var(--muted);">'+u.email+'</td><td class="py-3 px-2"><span class="badge '+(u.role==='super_admin'?'badge-danger':u.role==='restaurant_admin'?'badge-warning':'badge-info')+'">'+u.role.replace('_',' ')+'</span></td><td class="py-3 px-2" style="color:var(--muted);">'+u.joinedDate+'</td></tr>';});
  h += '</tbody></table></div></div>';
  // Restaurants
  h += '<div id="st-rests" class="hidden p-6 rounded-2xl" style="background:var(--card);border:1px solid var(--border);"><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr style="color:var(--muted);border-bottom:1px solid var(--border);"><th class="text-left py-3 px-2">Restaurant</th><th class="text-left py-3 px-2">Cuisine</th><th class="text-left py-3 px-2">Rating</th><th class="text-left py-3 px-2">Status</th></tr></thead><tbody>';
  RESTAURANTS.forEach(function(r){h+='<tr style="border-bottom:1px solid var(--border);"><td class="py-3 px-2"><div class="flex items-center gap-2"><img src="'+r.image+'" class="w-8 h-8 rounded-lg object-cover"><span style="color:var(--fg);" class="font-medium">'+r.name+'</span></div></td><td class="py-3 px-2" style="color:var(--muted);">'+r.cuisine+'</td><td class="py-3 px-2"><span class="flex items-center gap-1"><i class="fas fa-star text-amber-400 text-xs"></i>'+r.rating+'</span></td><td class="py-3 px-2"><span class="badge '+(r.approved?'badge-success':'badge-warning')+'">'+(r.approved?'Approved':'Pending')+'</span></td></tr>';});
  h += '</tbody></table></div></div>';
  // All Orders
  h += '<div id="st-allords" class="hidden p-6 rounded-2xl" style="background:var(--card);border:1px solid var(--border);"><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr style="color:var(--muted);border-bottom:1px solid var(--border);"><th class="text-left py-3 px-2">Order ID</th><th class="text-left py-3 px-2">Customer</th><th class="text-left py-3 px-2">Restaurant</th><th class="text-left py-3 px-2">Total</th><th class="text-left py-3 px-2">Status</th><th class="text-left py-3 px-2">Date</th></tr></thead><tbody>';
  allOrd.slice().reverse().slice(0,20).forEach(function(o){var u=S.users.find(function(x){return x.id===o.userId});var r=findRest(o.restaurantId);h+='<tr style="border-bottom:1px solid var(--border);"><td class="py-3 px-2 font-medium" style="color:var(--fg);">'+o.id+'</td><td class="py-3 px-2" style="color:var(--muted);">'+(u?u.name:'?')+'</td><td class="py-3 px-2" style="color:var(--muted);">'+(r?r.name:'?')+'</td><td class="py-3 px-2 font-medium" style="color:var(--fg);">'+fmtPrice(o.total)+'</td><td class="py-3 px-2"><span class="badge '+statusColor(o.status)+'">'+statusLabel(o.status)+'</span></td><td class="py-3 px-2" style="color:var(--muted);">'+timeAgo(o.placedAt)+'</td></tr>';});
  h += '</tbody></table></div></div>';
  h += '</main>'+footer();
  return h;
};
function showSuperTab(tab,btn) {
  ['approvals','users','rests','allords'].forEach(function(t){var el=document.getElementById('st-'+t);if(el)el.classList.toggle('hidden',t!==tab);});
  btn.parentElement.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});btn.classList.add('active');
}
function approveRest(id){var r=findRest(id);if(r){r.approved=true;saveState();render();showToast(r.name+' approved!','success');}}
function rejectRest(id){var r=findRest(id);if(r){r.approved=false;saveState();render();showToast(r.name+' rejected','warning');}}

/* ===================== CHARTS ===================== */
function initPageCharts() {
  var mutedColor = getComputedStyle(document.documentElement).getPropertyValue('--muted').trim() || '#64748B';
  var gridColor = getComputedStyle(document.documentElement).getPropertyValue('--border').trim() || '#E2E8F0';

  // Admin revenue chart
  var adminEl = document.getElementById('admin-chart');
  if(adminEl) {
    new Chart(adminEl, {
      type:'bar',
      data:{
        labels:['Jan','Feb','Mar','Apr','May','Jun'],
        datasets:[{label:'Revenue (Rs.)',data:[12500,18200,15800,22400,19800,26100],backgroundColor:'rgba(249,115,22,0.7)',borderRadius:8,borderSkipped:false}]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:mutedColor},grid:{display:false}},y:{ticks:{color:mutedColor},grid:{color:gridColor}}}}
    });
  }

  // Super admin orders chart
  var ordEl = document.getElementById('super-ord-chart');
  if(ordEl) {
    new Chart(ordEl, {
      type:'line',
      data:{
        labels:['Week 1','Week 2','Week 3','Week 4'],
        datasets:[
          {label:'Orders',data:[45,62,58,73],borderColor:'#F97316',backgroundColor:'rgba(249,115,22,0.1)',fill:true,tension:0.4},
          {label:'Delivered',data:[38,55,50,65],borderColor:'#10B981',backgroundColor:'rgba(16,185,129,0.1)',fill:true,tension:0.4}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:mutedColor}}},scales:{x:{ticks:{color:mutedColor},grid:{display:false}},y:{ticks:{color:mutedColor},grid:{color:gridColor}}}}
    });
  }

  // Super admin cuisine chart
  var cuiEl = document.getElementById('super-cui-chart');
  if(cuiEl) {
    new Chart(cuiEl, {
      type:'doughnut',
      data:{
        labels:['Chinese','Italian','Indian','Japanese','Mexican','Thai','American','Mediterranean'],
        datasets:[{data:[22,28,35,18,15,20,12,10],backgroundColor:['#EF4444','#10B981','#F97316','#3B82F6','#8B5CF6','#EC4899','#14B8A6','#F59E0B'],borderWidth:0}]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:mutedColor,boxWidth:12,padding:8,font:{size:11}}}}}
    });
  }
}

/* ===================== INIT ===================== */
initState();
render();
initRouter();

</script>
